<!doctype html>
<html lang="en">
  <head>
    <title>Conversations API — Reference</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Interactive reference for the v1/conversations API." />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💬</text></svg>" />
  </head>
  <body>
    <div id="app"></div>

    <script src="https://cdn.jsdelivr.net/npm/@scalar/api-reference"></script>
    <script>
      Scalar.createApiReference('#app', {
        url: './openapi.json',
        theme: 'purple',
        // ponytail: no proxyUrl on purpose — don't route API calls through a 3rd-party proxy.
        // If live "Send Request" is CORS-blocked, enable CORS on the API or add proxyUrl here.
      })
    </script>
  </body>
</html>
